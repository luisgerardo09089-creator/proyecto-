<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Préstamos - Luis Gerardo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #1a3a5f; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #1a3a5f; border: none; }
        .btn-primary:hover { background-color: #2c5d97; }
        .table-container { background: white; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Sistema de Préstamos de Proyectores</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card p-4">
                <h4 class="mb-3">Registrar Préstamo</h4>
                <form id="loanForm">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Solicitante</label>
                        <input type="text" class="form-control" name="nombre" placeholder="Ej. Prof. García" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Aula / Ubicación</label>
                        <select class="form-select" name="categoria" required>
                            <option value="">Seleccione...</option>
                            <option value="Aula 101">Aula 101</option>
                            <option value="Laboratorio">Laboratorio</option>
                            <option value="Auditorio">Auditorio</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ID/Modelo Proyector</label>
                        <input type="text" class="form-control" name="dato" placeholder="Ej. EPSON-01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Observaciones</label>
                        <textarea class="form-control" name="observaciones" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Guardar Registro</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="table-container shadow-sm">
                <h4 class="mb-3">Registros de Préstamos</h4>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Solicitante</th>
                                <th>Ubicación</th>
                                <th>Equipo</th>
                                <th>Fecha</th>
                            </tr>
                        </thead>
                        <tbody id="tablaRegistros">
                            <tr>
                                <td>1</td>
                                <td>Luis Gerardo Martinez</td>
                                <td>Aula 205</td>
                                <td>Sony VPL</td>
                                <td>2026-05-31</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="mt-3 text-end">
                    <button class="btn btn-outline-secondary btn-sm" onclick="window.location.reload()">Actualizar Tabla</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Ejemplo de validación para cumplir con "Mensajes de confirmación"
    document.getElementById('loanForm').onsubmit = function(e) {
        e.preventDefault();
        alert("¡Registro guardado con éxito en la base de datos!");
        // Aquí iría tu conexión fetch a PHP para guardar realmente los datos
    };
</script>

</body>
</html>
