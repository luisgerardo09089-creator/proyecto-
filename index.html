<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Préstamos de Proyectores</title>
<link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="contenedor">

<h1>Control de Préstamos de Proyectores</h1>

<input type="text" id="nombre" placeholder="Nombre del Profesor">

<input type="text" id="grupo" placeholder="Grupo">

<input type="text" id="proyector" placeholder="Número de Proyector">

<textarea id="observaciones" placeholder="Observaciones"></textarea>

<button onclick="guardar()">
Guardar Préstamo
</button>

<h2>Registros</h2>

<table id="tabla">
<tr>
<th>Profesor</th>
<th>Grupo</th>
<th>Proyector</th>
<th>Observaciones</th>
</tr>
</table>

</div>

<script src="script.js"></script>

</body>
</html>
